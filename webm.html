<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Instrument Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <h1>🎸 Music Store</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Instruments</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h2>Find Your Perfect Instrument</h2>
        <p>Guitars, Keyboards, Drums & More</p>
        <button>Shop Now</button>
    </section>

    <!-- Products -->
    <section class="products">
        <h2>Popular Instruments</h2>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1510915361894-db8b60106cb1" alt="Guitar">
            <h3>Acoustic Guitar</h3>
            <p>₹5,999</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1511379938547-c1f69419868d" alt="Keyboard">
            <h3>Keyboard</h3>
            <p>₹7,999</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1519892300165-cb5542fb47c7" alt="Drums">
            <h3>Drum Set</h3>
            <p>₹12,999</p>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 Music Store | All Rights Reserved</p>
    </footer>

</body>
</html>
